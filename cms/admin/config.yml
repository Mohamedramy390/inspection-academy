# Decap CMS Configuration for Inspection Academy
# ─────────────────────────────────────────────────────────────────────────────
# Documentation: https://decapcms.org/docs/configuration-options/
#
# SETUP STEPS:
# 1. Push this project to GitHub
# 2. Create a Netlify site connected to the GitHub repo
# 3. Enable "Identity" and "Git Gateway" in Netlify settings
# 4. Visit yoursite.netlify.app/admin to log in and manage content
#
# For local testing: run `npx netlify-cms-proxy-server` in a separate terminal,
# then set backend to local_backend: true below.
# ─────────────────────────────────────────────────────────────────────────────

backend:
  name: git-gateway
  branch: main   # Branch to push content to

# Uncomment for local development:
# local_backend: true

media_folder: cms/media          # Where uploaded images are stored
public_folder: /cms/media        # Public URL prefix for images

# ── Collections ─────────────────────────────────────────────────────────────
collections:

  # ── Site Settings ──────────────────────────────────────────────────────────
  - name: "site_settings"
    label: "Site Settings"
    files:
      - name: "general"
        label: "General Settings"
        file: "cms/content/data.json"
        fields:
          - label: "Site"
            name: "site"
            widget: "object"
            fields:
              - { label: "Site Name",    name: "name",        widget: "string" }
              - { label: "Tagline",      name: "tagline",     widget: "string" }
              - { label: "Description",  name: "description", widget: "text" }
              - { label: "Hero Image",   name: "heroImage",   widget: "image" }
              - { label: "Address",      name: "address",     widget: "string" }
              - { label: "Phone",        name: "phone",       widget: "string" }
              - { label: "Email",        name: "email",       widget: "string" }

  # ── Courses ─────────────────────────────────────────────────────────────────
  - name: "courses"
    label: "Courses"
    folder: "cms/content/courses"
    create: true
    slug: "{{slug}}"
    format: "json"
    fields:
      - { label: "ID",              name: "id",              widget: "string" }
      - { label: "Title",           name: "title",           widget: "string" }
      - { label: "Category",        name: "category",        widget: "string" }
      - label: "Type"
        name: "type"
        widget: "select"
        options: ["Online", "Public", "In-House"]
      - { label: "Duration",        name: "duration",        widget: "string",  hint: "e.g. 40 Hours" }
      - { label: "Days Count",      name: "daysCount",       widget: "string",  hint: "e.g. 6 Days" }
      - label: "Level"
        name: "level"
        widget: "select"
        options: ["Beginner", "Intermediate", "Advanced"]
      - { label: "Badge Text",      name: "badge",           widget: "string" }
      - { label: "Hero Image",      name: "image",           widget: "image" }
      - { label: "Short Description", name: "description",   widget: "text" }
      - { label: "Full Description",  name: "fullDescription", widget: "text" }
      - { label: "Objectives",      name: "objectives",      widget: "text" }
      - label: "Required Materials"
        name: "materials"
        widget: "list"
        field:
          label: "Material"
          name: "item"
          widget: "string"
      - label: "Agenda"
        name: "agenda"
        widget: "list"
        fields:
          - { label: "Day",   name: "day",   widget: "string" }
          - { label: "Topic", name: "topic", widget: "string" }

  # ── Upcoming Events ─────────────────────────────────────────────────────────
  - name: "events"
    label: "Upcoming Events"
    folder: "cms/content/events"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    format: "json"
    fields:
      - { label: "Course ID",  name: "courseId",  widget: "string", hint: "Must match a course id" }
      - { label: "Date Range", name: "dateRange",  widget: "string", hint: "e.g. Oct 15 – Oct 20" }
      - { label: "Category",   name: "category",   widget: "string" }

  # ── Consultation Services ────────────────────────────────────────────────────
  - name: "consultation"
    label: "Consultation Services"
    folder: "cms/content/consultation"
    create: true
    slug: "{{slug}}"
    format: "json"
    fields:
      - { label: "ID",          name: "id",          widget: "string" }
      - { label: "Title",       name: "title",        widget: "string" }
      - { label: "Description", name: "description",  widget: "text" }
      - label: "Icon"
        name: "icon"
        widget: "select"
        hint: "Ionicons icon name"
        options:
          - { label: "Analytics",       value: "analytics-outline" }
          - { label: "Fitness",         value: "fitness-outline" }
          - { label: "Settings",        value: "settings-outline" }
          - { label: "Checkmark Done",  value: "checkmark-done-outline" }
          - { label: "Construct",       value: "construct-outline" }
          - { label: "Warning",         value: "warning-outline" }
          - { label: "Shield",          value: "shield-checkmark-outline" }
          - { label: "Document",        value: "document-text-outline" }

  # ── About Page ──────────────────────────────────────────────────────────────
  - name: "about"
    label: "About Page"
    files:
      - name: "about_content"
        label: "About Content"
        file: "cms/content/about.json"
        fields:
          - { label: "Headline",  name: "headline", widget: "string" }
          - { label: "Body Text", name: "body",     widget: "text" }
          - { label: "Image",     name: "image",    widget: "image" }
          - { label: "Mission",   name: "mission",  widget: "text" }
          - { label: "Vision",    name: "vision",   widget: "text" }
          - label: "Stats"
            name: "stats"
            widget: "list"
            fields:
              - { label: "Value", name: "value", widget: "string" }
              - { label: "Label", name: "label", widget: "string" }
